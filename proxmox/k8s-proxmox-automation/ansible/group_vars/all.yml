---
# group_vars/all.yml
# Variables shared across ALL nodes in the cluster.
# Override per-group in group_vars/masters.yml or group_vars/workers.yml

# ── Kubernetes ──────────────────────────────────────────────
k8s_version: "1.31"
pod_network_cidr: "10.244.0.0/16"
calico_version: "3.28.2"

# ── Container runtime ───────────────────────────────────────
containerd_config_path: /etc/containerd/config.toml

# ── Access ──────────────────────────────────────────────────
root_password: "KubeAdmin@2024!"   # override via vault or --extra-vars

# ── SSH hardening ───────────────────────────────────────────
ssh_password_auth: "yes"
ssh_permit_root_login: "yes"

# ── Ansible connection ──────────────────────────────────────
ansible_python_interpreter: /usr/bin/python3
ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
