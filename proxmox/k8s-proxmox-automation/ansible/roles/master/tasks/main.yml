---
# roles/master/tasks/main.yml
# Tasks run ONLY on master nodes

# ── 1. Pull Kubernetes images ──────────────────────────────
- name: Pull Kubernetes control plane images
  ansible.builtin.command: kubeadm config images pull
  register: images_pull
  changed_when: "'Pulled' in images_pull.stdout"

# ── 2. Initialize cluster (primary master only) ────────────
- name: Check if cluster is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf

- name: Initialize Kubernetes cluster
  ansible.builtin.command: >
    kubeadm init
    --pod-network-cidr={{ pod_network_cidr }}
    --apiserver-advertise-address={{ ansible_host }}
    --ignore-preflight-errors=all
  register: kubeadm_init
  when:
    - not kubeadm_admin_conf.stat.exists
    - inventory_hostname == groups['masters'][0]
  changed_when: kubeadm_init.rc == 0

- name: Show kubeadm init output
  ansible.builtin.debug:
    msg: "{{ kubeadm_init.stdout_lines }}"
  when:
    - kubeadm_init is defined
    - kubeadm_init.stdout is defined

# ── 3. Configure kubectl for root ─────────────────────────
- name: Create .kube directory for root
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: "0700"

- name: Copy admin.conf to root kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    mode: "0600"
  when: inventory_hostname == groups['masters'][0]

# ── 4. Deploy Calico CNI ───────────────────────────────────
- name: Check if Calico tigera-operator is already deployed
  ansible.builtin.command: kubectl get namespace tigera-operator
  register: tigera_ns
  failed_when: false
  changed_when: false
  when: inventory_hostname == groups['masters'][0]

- name: Deploy Calico tigera-operator
  ansible.builtin.command: >
    kubectl create -f
    https://raw.githubusercontent.com/projectcalico/calico/v{{ calico_version }}/manifests/tigera-operator.yaml
  when:
    - inventory_hostname == groups['masters'][0]
    - tigera_ns.rc != 0
  register: calico_operator
  changed_when: calico_operator.rc == 0

- name: Check if Calico custom-resources already exist
  ansible.builtin.command: kubectl get installation default
  register: calico_cr
  failed_when: false
  changed_when: false
  when: inventory_hostname == groups['masters'][0]

- name: Deploy Calico custom resources
  ansible.builtin.command: >
    kubectl create -f
    https://raw.githubusercontent.com/projectcalico/calico/v{{ calico_version }}/manifests/custom-resources.yaml
  when:
    - inventory_hostname == groups['masters'][0]
    - calico_cr.rc != 0
  register: calico_cr_deploy
  changed_when: calico_cr_deploy.rc == 0

# ── 5. Fix kube-proxy for Proxmox LXC ─────────────────────
- name: Wait for kube-proxy configmap to exist
  ansible.builtin.command: kubectl get configmap kube-proxy -n kube-system
  register: kube_proxy_cm
  until: kube_proxy_cm.rc == 0
  retries: 15
  delay: 10
  when: inventory_hostname == groups['masters'][0]

- name: Export kube-proxy configmap
  ansible.builtin.command: >
    kubectl get configmap kube-proxy -n kube-system -o yaml
  register: kube_proxy_yaml
  changed_when: false
  when: inventory_hostname == groups['masters'][0]

- name: Save kube-proxy configmap to file
  ansible.builtin.copy:
    content: "{{ kube_proxy_yaml.stdout }}"
    dest: /tmp/kube-proxy-config.yaml
    mode: "0644"
  when: inventory_hostname == groups['masters'][0]

- name: Set kube-proxy mode to iptables
  ansible.builtin.replace:
    path: /tmp/kube-proxy-config.yaml
    regexp: 'mode: ""'
    replace: 'mode: "iptables"'
  when: inventory_hostname == groups['masters'][0]

- name: Zero out conntrack maxPerCore
  ansible.builtin.replace:
    path: /tmp/kube-proxy-config.yaml
    regexp: 'maxPerCore: null'
    replace: 'maxPerCore: 0'
  when: inventory_hostname == groups['masters'][0]

- name: Zero out conntrack min
  ansible.builtin.replace:
    path: /tmp/kube-proxy-config.yaml
    regexp: '(\s+min:) null'
    replace: '\1 0'
  when: inventory_hostname == groups['masters'][0]

- name: Apply patched kube-proxy configmap
  ansible.builtin.command: kubectl apply -f /tmp/kube-proxy-config.yaml
  register: kube_proxy_apply
  changed_when: "'configured' in kube_proxy_apply.stdout"
  when: inventory_hostname == groups['masters'][0]

- name: Restart kube-proxy pods
  ansible.builtin.command: >
    kubectl delete pods -n kube-system -l k8s-app=kube-proxy
  changed_when: true
  when: inventory_hostname == groups['masters'][0]

# ── 6. Generate join command ───────────────────────────────
- name: Generate worker join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: join_command_raw
  changed_when: false
  when: inventory_hostname == groups['masters'][0]

- name: Save join command to file on master
  ansible.builtin.copy:
    content: "{{ join_command_raw.stdout }}"
    dest: /joincluster.sh
    mode: "0755"
  when: inventory_hostname == groups['masters'][0]

- name: Store join command as fact for use by worker play
  ansible.builtin.set_fact:
    k8s_join_command: "{{ join_command_raw.stdout }} --ignore-preflight-errors=SystemVerification"
  when: inventory_hostname == groups['masters'][0]

# ── 7. Wait for cluster to stabilise ──────────────────────
- name: Wait for all control plane pods to be Running
  ansible.builtin.command: >
    kubectl get pods -n kube-system -o jsonpath='{.items[*].status.phase}'
  register: pod_phases
  until: "'Pending' not in pod_phases.stdout and pod_phases.stdout != ''"
  retries: 30
  delay: 10
  changed_when: false
  when: inventory_hostname == groups['masters'][0]
