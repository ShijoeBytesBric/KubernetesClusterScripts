---
# roles/common/tasks/main.yml
# Bootstrap tasks run on EVERY node (master + worker)

# ── 1. Essential packages ───────────────────────────────────
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install essential system packages
  ansible.builtin.apt:
    name:
      - net-tools
      - curl
      - openssh-server
      - software-properties-common
      - cron
      - conntrack          # required by kubeadm preflight
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
    state: present

- name: Enable and start cron
  ansible.builtin.systemd:
    name: cron
    enabled: true
    state: started

# ── 2. Kernel modules ──────────────────────────────────────
- name: Load required kernel modules now
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter
  ignore_errors: true  # inside LXC, modules are already loaded by host

- name: Persist kernel modules across reboots
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    mode: "0644"

# ── 3. Sysctl parameters ───────────────────────────────────
- name: Set sysctl parameters for Kubernetes
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/k8s.conf
    reload: true
  loop:
    - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
    - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { key: "net.ipv4.ip_forward",                 value: "1" }
  ignore_errors: true  # LXC may restrict some sysctl writes

- name: Enable ip_forward directly (LXC fallback)
  ansible.builtin.shell: echo 1 > /proc/sys/net/ipv4/ip_forward
  changed_when: false

# ── 4. Disable swap ────────────────────────────────────────
- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Remove swap from /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

# ── 5. Install containerd ──────────────────────────────────
- name: Add Docker GPG key
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker apt repository (for containerd.io)
  ansible.builtin.shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
    https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
    > /etc/apt/sources.list.d/docker.list
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Install containerd
  ansible.builtin.apt:
    name: containerd.io
    update_cache: true
    state: present

- name: Generate default containerd config
  ansible.builtin.shell: containerd config default > {{ containerd_config_path }}
  args:
    creates: "{{ containerd_config_path }}"

- name: Enable SystemdCgroup in containerd config
  ansible.builtin.replace:
    path: "{{ containerd_config_path }}"
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'

- name: Enable and restart containerd
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: restarted

# ── 6. Add Kubernetes apt repository ──────────────────────
- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Kubernetes GPG key
  ansible.builtin.shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key \
      | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    content: |
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /
    mode: "0644"

# ── 7. Install Kubernetes components ──────────────────────
- name: Install kubeadm, kubelet, kubectl
  ansible.builtin.apt:
    name:
      - kubeadm
      - kubelet
      - kubectl
    update_cache: true
    state: present

- name: Hold Kubernetes packages at current version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubeadm
    - kubelet
    - kubectl

- name: Configure kubelet to ignore swap
  ansible.builtin.copy:
    dest: /etc/default/kubelet
    content: 'KUBELET_EXTRA_ARGS="--fail-swap-on=false"'
    mode: "0644"

- name: Restart kubelet
  ansible.builtin.systemd:
    name: kubelet
    state: restarted
    enabled: true
  ignore_errors: true  # kubelet will fail until kubeadm init, that is expected

# ── 8. SSH configuration ───────────────────────────────────
- name: Allow SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication {{ ssh_password_auth }}'

- name: Allow SSH root login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin {{ ssh_permit_root_login }}'

- name: Start and enable SSH
  ansible.builtin.systemd:
    name: ssh
    enabled: true
    state: started

- name: Reload SSH config
  ansible.builtin.systemd:
    name: ssh
    state: reloaded

# ── 9. Set root password ───────────────────────────────────
- name: Set root password
  ansible.builtin.user:
    name: root
    password: "{{ root_password | password_hash('sha512') }}"

# ── 10. Shell convenience ──────────────────────────────────
- name: Set TERM in bashrc
  ansible.builtin.lineinfile:
    path: /etc/bash.bashrc
    line: 'export TERM=xterm'
    create: true
