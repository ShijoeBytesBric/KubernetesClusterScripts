---
# roles/worker/tasks/main.yml
# Tasks run ONLY on worker nodes

# ── 1. Fetch join command from primary master ──────────────
- name: Fetch join command from primary master
  ansible.builtin.slurp:
    src: /joincluster.sh
  register: join_script_b64
  delegate_to: "{{ groups['masters'][0] }}"

- name: Decode join command
  ansible.builtin.set_fact:
    k8s_join_command: >-
      {{ (join_script_b64.content | b64decode | trim) }}
      --ignore-preflight-errors=SystemVerification

# ── 2. Check if already joined ────────────────────────────
- name: Check if node is already part of a cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

# ── 3. Join cluster ────────────────────────────────────────
- name: Join worker to Kubernetes cluster
  ansible.builtin.command: "{{ k8s_join_command }}"
  when: not kubelet_conf.stat.exists
  register: join_result
  changed_when: join_result.rc == 0

- name: Show join output
  ansible.builtin.debug:
    msg: "{{ join_result.stdout_lines }}"
  when:
    - join_result is defined
    - join_result.stdout is defined

# ── 4. Verify kubelet is running ───────────────────────────
- name: Ensure kubelet is enabled and running
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    state: started
