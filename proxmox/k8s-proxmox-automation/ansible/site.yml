---
# site.yml — Master playbook: bootstrap all nodes then set up cluster
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini site.yml
#   ansible-playbook -i inventory/hosts.ini site.yml --tags common
#   ansible-playbook -i inventory/hosts.ini site.yml --extra-vars "root_password=MySecret"

# ── Play 1: Bootstrap every node ──────────────────────────
- name: Bootstrap all cluster nodes
  hosts: k8s_cluster
  become: true
  gather_facts: true
  any_errors_fatal: false
  roles:
    - common
  tags:
    - common
    - bootstrap

# ── Play 2: Set up master nodes ───────────────────────────
- name: Configure Kubernetes master(s)
  hosts: masters
  become: true
  gather_facts: false
  serial: 1          # initialise masters one at a time
  roles:
    - master
  tags:
    - master
    - control-plane

# ── Play 3: Join worker nodes ─────────────────────────────
- name: Join worker nodes to cluster
  hosts: workers
  become: true
  gather_facts: false
  roles:
    - worker
  tags:
    - worker

# ── Play 4: Smoke test ────────────────────────────────────
- name: Verify cluster health
  hosts: "{{ groups['masters'][0] }}"
  become: true
  gather_facts: false
  tags:
    - verify
  tasks:
    - name: Wait for all nodes to be Ready
      ansible.builtin.command: >
        kubectl get nodes -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.status.conditions[-1].type}{" "}{.status.conditions[-1].status}{"\n"}{end}'
      register: node_status
      until: >
        node_status.stdout_lines | select('search', 'NotReady') | list | length == 0
        and node_status.stdout_lines | length > 0
      retries: 40
      delay: 15
      changed_when: false

    - name: Show node status
      ansible.builtin.debug:
        msg: "{{ node_status.stdout_lines }}"

    - name: Show all pod status
      ansible.builtin.command: kubectl get pods -A
      register: all_pods
      changed_when: false

    - name: Display pod list
      ansible.builtin.debug:
        msg: "{{ all_pods.stdout_lines }}"
